behaviors:
  KillerAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 12800
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    checkpoint_interval: 500000
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000

  SurvivorAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 12800
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    checkpoint_interval: 500000
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000

environment_parameters: {}

engine_settings:
  time_scale: 1
  width: 84
  height: 84
  quality_level: 5
  target_frame_rate: -1
  capture_frame_rate: 60
  no_graphics: false

checkpoint_settings:
  run_id: ModelMystery_Run
  initialize_from: null
  load_model: false
  resume: false
  force: true
  train_model: true
  inference: false
  results_dir: results